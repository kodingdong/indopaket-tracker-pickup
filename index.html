<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paket Pickup Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <h2 style="margin: 0; font-size: 1.25rem;">Paket Pickup Tracker <span style="font-size:0.7rem; color:var(--color-primary);">v6</span></h2>
        <div id="sync-indicator" class="sync-badge not-configured" onclick="App.navigate('settings')" title="Sync Status">☁️</div>
    </header>

    <main id="app-content" class="container">
        <!-- Content will be dynamically rendered here -->
        <div id="view-dashboard" class="view active">
            <!-- Dashboard content will be rendered here by js/dashboard.js -->
        </div>
        <div id="view-add" class="view" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 id="view-add-title">Tambah Paket</h2>
            </div>
            
            <div id="add-tabs" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 0.5rem;">
                <button class="btn btn-primary" id="tab-manual" style="flex: 1; min-width: 100px; padding: 0.5rem;" onclick="Package.renderForm()">Manual</button>
                <button class="btn" id="tab-ocr" style="flex: 1; min-width: 100px; background: var(--color-surface-2); color: white; padding: 0.5rem;" onclick="if(window.OCR) window.OCR.renderUpload()">Upload OCR</button>
                <button class="btn" id="tab-bulk" style="flex: 1; min-width: 100px; background: var(--color-surface-2); color: white; padding: 0.5rem;" onclick="if(window.OCR) window.OCR.renderBulkPaste()">📊 Excel OCR</button>
            </div>

            <div id="package-form-container"></div>
        </div>
        <div id="view-trip" class="view" style="display: none;">
            <!-- Trip content will be dynamically rendered here by js/trip.js -->
        </div>
        <div id="view-stats" class="view" style="display: none;">
            <h2>Statistik</h2>
            <div class="card glassmorphism">
                <p>Statistik view content...</p>
            </div>
        </div>
        <div id="view-stores" class="view" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Daftar Toko</h2>
                <button id="add-store-btn" class="btn btn-primary" style="width: auto; padding: 0.5rem 1rem;" onclick="Store.renderForm()">+ Tambah</button>
            </div>
            <div id="store-form-container" style="display: none; margin-bottom: 1rem;"></div>
            <div id="stores-container"></div>
        </div>
        <div id="view-package-detail" class="view" style="display: none;">
            <div id="package-detail-container"></div>
        </div>
        <div id="view-pickup" class="view" style="display: none;">
            <!-- Pickup content will be dynamically rendered here by js/pickup.js -->
        </div>
        <div id="view-settings" class="view" style="display: none;"></div>
        <div id="view-admin" class="view" style="display: none;"></div>
    </main>

    <nav class="bottom-nav">
        <a href="#dashboard" class="nav-item active" data-target="view-dashboard">
            <span>Dashboard</span>
        </a>
        <a href="#add" class="nav-item" data-target="view-add">
            <span>Tambah</span>
        </a>
        <a href="#trip" class="nav-item" data-target="view-trip">
            <span>Trip</span>
        </a>
        <a href="#stats" class="nav-item" data-target="view-stats">
            <span>Statistik</span>
        </a>
        <a href="#admin" class="nav-item nav-admin-only" data-target="view-admin">
            <span>🖥️</span>
        </a>
        <a href="#settings" class="nav-item" data-target="view-settings">
            <span>⚙️</span>
        </a>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/store.js"></script>
    <script src="js/package.js"></script>
    <script src="js/ocr.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/trip.js"></script>
    <script src="js/pickup.js"></script>
    <script src="js/barcode.js"></script>
    <script src="js/reminder.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/audit-log.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker failed', err));
            });
        }
    </script>
</body>
</html>
